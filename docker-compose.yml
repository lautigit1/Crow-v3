# Unified stack: PostgreSQL + FastAPI backend + React/nginx frontend.
# Run everything with:  docker compose up --build
#
#   Frontend (sitio):   http://localhost:8080
#   API (Swagger):      http://localhost:8000/docs

services:
  db:
    image: postgres:16-alpine
    container_name: crow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: crow
      POSTGRES_PASSWORD: crow_dev_password
      POSTGRES_DB: crow_repuestos
    volumes:
      - crow_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crow -d crow_repuestos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: crow_redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no  # in-memory only, no persistence
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build: ./backend
    container_name: crow_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://crow:crow_dev_password@db:5432/crow_repuestos
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      BACKEND_CORS_ORIGINS: "http://localhost:8080,http://localhost:5173"
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@crowrepuestos.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_USER_EMAIL: ${SEED_USER_EMAIL:-cliente@crowrepuestos.com}
      SEED_USER_PASSWORD: ${SEED_USER_PASSWORD:-cliente1234}
      # IP del container nginx en la red Docker interna (para X-Forwarded-For seguro).
      # Obtener con: docker inspect crow_web | grep IPAddress
      TRUSTED_PROXIES: ${TRUSTED_PROXIES:-}
      REDIS_URL: redis://crow_redis:6379/0
    ports:
      - "8000:8000" # expuesto para ver Swagger en /docs (el front usa el proxy de nginx)

  web:
    build: ./frontend
    container_name: crow_web
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  crow_pgdata:
